name: jl_signals
description: Flutter plugin for the Ocean Engine conversion signal SDK.
version: 0.0.1
homepage:

environment:
  sdk: ^3.9.0
  flutter: '>=3.3.0'

dependencies:
  flutter:
    sdk: flutter
  plugin_platform_interface: ^2.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  plugin:
    platforms:
      android:
        package: com.jl.signals.jl_signals
        pluginClass: JlSignalsPlugin
      ios:
        pluginClass: JlSignalsPlugin
